<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artha Interior Designers — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C97A;
      --gold-pale: #F5E6B8;
      --navy: #0A0E1A;
      --navy-mid: #111827;
      --navy-light: #1a2235;
      --white: #FDFAF3;
      --cream: #F0E8D5;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--navy);
      font-family: 'Raleway', sans-serif;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* ── CANVAS PARTICLES ── */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── BACKGROUND RADIAL GLOW ── */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 40%, rgba(201,168,76,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 100% 80% at 50% 100%, rgba(10,14,26,1) 0%, transparent 60%),
        linear-gradient(160deg, #080C17 0%, #0D1322 40%, #111827 100%);
    }

    /* ── DECORATIVE CORNER ORNAMENTS ── */
    .corner {
      position: fixed;
      width: 120px; height: 120px;
      z-index: 1;
      opacity: 0.45;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner.tl { top: 18px; left: 18px; }
    .corner.tr { top: 18px; right: 18px; transform: scaleX(-1); }
    .corner.bl { bottom: 18px; left: 18px; transform: scaleY(-1); }
    .corner.br { bottom: 18px; right: 18px; transform: scale(-1,-1); }

    /* ── MAIN CONTENT ── */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 0;
    }

    /* ── LOGO ── */
    .logo-wrap {
      position: relative;
      width: 200px; height: 200px;
      margin-bottom: 40px;
      animation: floatLogo 6s ease-in-out infinite;
    }
    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -18px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 70%);
      animation: pulse-glow 3s ease-in-out infinite;
    }
    .logo-wrap::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.3);
      animation: ring-rotate 12s linear infinite;
    }
    .logo-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      border-radius: 50%;
      filter: drop-shadow(0 0 28px rgba(201,168,76,0.55)) drop-shadow(0 0 60px rgba(201,168,76,0.2));
      animation: logoReveal 1.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }
    @keyframes ring-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes logoReveal {
      from { opacity: 0; transform: scale(0.7); filter: blur(12px); }
      to { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 28px rgba(201,168,76,0.55)) drop-shadow(0 0 60px rgba(201,168,76,0.2)); }
    }

    /* ── DIVIDER ── */
    .ornament-line {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      animation: fadeUp 1s 0.4s both;
    }
    .ornament-line .line {
      width: 70px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .ornament-line .diamond {
      width: 7px; height: 7px;
      background: var(--gold);
      transform: rotate(45deg);
      box-shadow: 0 0 10px rgba(201,168,76,0.6);
    }

    /* ── COMING SOON ── */
    .coming-soon {
      font-family: 'Cinzel', serif;
      font-size: clamp(11px, 2.2vw, 14px);
      letter-spacing: 0.45em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 16px;
      animation: fadeUp 1s 0.5s both;
      font-weight: 400;
    }

    /* ── HEADLINE ── */
    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 9vw, 86px);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: var(--white);
      animation: fadeUp 1s 0.65s both;
      margin-bottom: 4px;
    }
    .headline em {
      font-style: italic;
      color: var(--gold-light);
    }

    /* ── TAGLINE ── */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(16px, 3vw, 22px);
      font-weight: 300;
      font-style: italic;
      color: rgba(240,232,213,0.65);
      letter-spacing: 0.12em;
      margin-bottom: 44px;
      animation: fadeUp 1s 0.8s both;
    }

    /* ── CTA BUTTON ── */
    .cta-wrap {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 52px;
      animation: fadeUp 1s 0.95s both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      font-family: 'Raleway', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 0;
      cursor: pointer;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      z-index: 0;
    }
    .btn-primary:hover::before { transform: translateX(0); }
    .btn-primary:hover { color: var(--navy); }
    .btn-primary span, .btn-primary svg { position: relative; z-index: 1; }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.3);
      color: rgba(240,232,213,0.6);
    }
    .btn-secondary:hover {
      border-color: rgba(201,168,76,0.7);
      color: var(--gold-pale);
    }
    .btn-secondary svg { position: relative; z-index: 1; }

    /* ── BOTTOM DIVIDER ── */
    .bottom-divider {
      width: 200px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
      margin-bottom: 28px;
      animation: fadeUp 1s 1.05s both;
    }

    /* ── CONTACT INFO ── */
    .info-row {
      display: flex;
      flex-wrap: wrap;
      gap: 24px 40px;
      justify-content: center;
      align-items: center;
      animation: fadeUp 1s 1.1s both;
    }
    .info-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      letter-spacing: 0.14em;
      color: rgba(240,232,213,0.45);
      text-transform: uppercase;
      font-weight: 300;
      text-decoration: none;
      transition: color 0.3s;
    }
    .info-item:hover { color: var(--gold-light); }
    .info-item svg { flex-shrink: 0; opacity: 0.6; }


    /* ── LETTERMARK ── */
    .lettermark {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(145deg, #0D1830 0%, #111827 100%);
      border: 1.5px solid rgba(201,168,76,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 88px;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(201,168,76,0.7), 0 0 60px rgba(201,168,76,0.3);
      filter: drop-shadow(0 0 28px rgba(201,168,76,0.55));
      user-select: none;
      line-height: 1;
      letter-spacing: -2px;
    }

    /* ── ANIMATIONS ── */

      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }


    /* ── COPYRIGHT ── */

      margin-top: 28px;
      font-size: 10px;
      letter-spacing: 0.16em;
      color: rgba(240,232,213,0.25);
      font-weight: 300;
      text-transform: uppercase;
      animation: fadeUp 1s 1.2s both;
    }

    /* ── MOBILE ── */

      .corner { width: 70px; height: 70px; }

      .corner.bl { bottom: 10px; left: 10px; }
      .corner.br { bottom: 10px; right: 10px; }
      .btn { padding: 12px 22px; font-size: 11px; }
    }
  </style>
</head>

    // ── PARTICLES
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    let W, H, particles = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', () => { resize(); init(); });

    function rand(min, max) { return Math.random() * (max - min) + min; }

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = rand(0, W);
        this.y = rand(0, H);
        this.size = rand(0.5, 2.2);
        this.alpha = rand(0.08, 0.55);
        this.speed = rand(0.08, 0.35);
        this.angle = rand(0, Math.PI * 2);
        this.drift = rand(-0.003, 0.003);
        this.pulse = rand(0, Math.PI * 2);
        this.pulseSpeed = rand(0.005, 0.02);
        this.gold = Math.random() > 0.6;
      }
      update() {
        this.angle += this.drift;
        this.x += Math.cos(this.angle) * this.speed;
        this.y -= this.speed * 0.4;
        this.pulse += this.pulseSpeed;
        if (this.y < -10 || this.x < -10 || this.x > W + 10) this.reset();
      }
      draw() {
        const a = this.alpha * (0.7 + 0.3 * Math.sin(this.pulse));
        ctx.save();
        ctx.globalAlpha = a;
        ctx.fillStyle = this.gold ? '#C9A84C' : '#FDFAF3';
        ctx.shadowColor = this.gold ? '#C9A84C' : '#FDFAF3';
        ctx.shadowBlur = this.gold ? 8 : 3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function init() {
      const count = Math.floor((W * H) / 8000);
      particles = Array.from({ length: Math.min(count, 130) }, () => new Particle());
    }
    init();

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }
    loop();
  </script>
